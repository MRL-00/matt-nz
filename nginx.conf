server {
  listen 80 default_server;
  listen [::]:80 default_server;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Don't advertise nginx version
  server_tokens off;

  # Sensible gzip defaults for static assets
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_comp_level 6;
  gzip_types
    text/plain
    text/css
    text/xml
    application/json
    application/javascript
    application/xml
    application/xml+rss
    application/rss+xml
    application/atom+xml
    image/svg+xml
    font/woff
    font/woff2;

  # Astro is configured with `format: 'file'` and `trailingSlash: 'never'`,
  # so /projects -> /projects.html, /writing -> /writing.html, etc.
  # try_files appends .html when the literal path doesn't exist.
  location / {
    try_files $uri $uri.html $uri/index.html =404;
  }

  # Long cache for fingerprinted assets emitted by Astro/Vite
  location /_astro/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # Static assets in /public
  location ~* \.(?:css|js|woff2?|ttf|eot|otf|svg|png|jpg|jpeg|gif|webp|avif|ico|map)$ {
    expires 30d;
    add_header Cache-Control "public";
    try_files $uri =404;
  }

  # RSS feed served with the correct media type
  location = /feed.xml {
    types { } default_type application/rss+xml;
    try_files $uri =404;
  }

  # Don't cache HTML so deploys are visible immediately
  location ~* \.html$ {
    add_header Cache-Control "no-cache";
    try_files $uri =404;
  }

  # Explicit 404 page if you ever add one
  error_page 404 /404.html;
}
